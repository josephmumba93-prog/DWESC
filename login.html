<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — DW Engineering IPSS</title>
<link rel="stylesheet" href="assets/style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body {
    background: var(--navy-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
  }

  .login-brand {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-brand img {
    height: 56px;
    margin-bottom: 14px;
  }

  .login-brand-name {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  .login-brand-tag {
    color: #8FA0B5;
    font-size: 12px;
    margin-top: 4px;
  }

  .login-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 32px 30px;
    box-shadow: var(--shadow-md);
  }

  .login-card h1 {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px;
  }

  .login-card p.sub {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 22px;
  }

  .login-btn {
    width: 100%;
    justify-content: center;
    margin-top: 6px;
    padding: 11px 16px;
  }

  .login-error {
    background: var(--danger-bg);
    color: var(--danger);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    margin-bottom: 16px;
    display: none;
  }

  .login-footer {
    text-align: center;
    color: #6B7A8F;
    font-size: 11.5px;
    margin-top: 22px;
  }
</style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-brand">
      <img src="assets/dw-logo.png" alt="DW Engineering Solution & Contractors Ltd" />
      <div class="login-brand-name">DW ENGINEERING SOLUTION<br/>&amp; CONTRACTORS LTD</div>
      <div class="login-brand-tag">Inventory · Procurement · Sales · Service</div>
    </div>

    <div class="login-card">
      <h1>Sign in</h1>
      <p class="sub">Use the account your administrator set up for you.</p>

      <div class="login-error" id="errorBox"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="username" required placeholder="you@dwescltd.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Sign in</button>
      </form>
    </div>

    <div class="login-footer">DW Engineering Solution &amp; Contractors Ltd &middot; Internal System</div>
  </div>

<script src="assets/supabase-config.js"></script>
<script>
  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("errorBox");
  const loginBtn = document.getElementById("loginBtn");

  // If already logged in, skip straight to the dashboard.
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = "dashboard.html";
    }
  })();

  function showError(message) {
    errorBox.textContent = message;
    errorBox.style.display = "block";
  }

  function hideError() {
    errorBox.style.display = "none";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in...";

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign in";
      showError(
        error.message.includes("Invalid login credentials")
          ? "Incorrect email or password. Please try again."
          : error.message
      );
      return;
    }

    // Confirm a profile row exists before sending them in (catches the case
    // where an auth user exists but no profile/role was ever set up).
    const { data: profile, error: profileError } = await supabase
      .from("profiles")
      .select("id, active")
      .eq("id", data.user.id)
      .single();

    if (profileError || !profile) {
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign in";
      showError("Your account isn't fully set up yet. Please contact your administrator.");
      await supabase.auth.signOut();
      return;
    }

    if (!profile.active) {
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign in";
      showError("Your account has been deactivated. Please contact your administrator.");
      await supabase.auth.signOut();
      return;
    }

    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
